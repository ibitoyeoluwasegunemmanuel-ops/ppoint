version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_DB: ppoint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ppoint']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ppoint
      DB_USER: postgres
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      GRID_SIZE: 20
      PROXIMITY_RADIUS: 15
      FRONTEND_URL: https://ppoint.online
      USE_IN_MEMORY_DB: 'false'
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\'http://127.0.0.1:3000/health\').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))"']
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '127.0.0.1:8080:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data: