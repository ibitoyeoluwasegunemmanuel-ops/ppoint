version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    restart: unless-stopped
    environment:
      POSTGRES_DB: ppoint
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d ppoint']
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=ppoint
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - ADMIN_TOKEN=your-secure-admin-token
      - FRONTEND_URL=http://localhost
      - USE_IN_MEMORY_DB=false
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(\'http://127.0.0.1:3000/health\').then((res) => { if (!res.ok) process.exit(1); }).catch(() => process.exit(1))"']
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
