services:
  - type: web
    name: ppoint-api
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://ppoint.online
      - key: API_BASE_URL
        value: https://api.ppoint.online
      - key: GRID_SIZE
        value: 20
      - key: PROXIMITY_RADIUS
        value: 15
      - key: USE_IN_MEMORY_DB
        value: false
      - key: INIT_DB_ON_START
        value: false
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_TOKEN
        sync: false